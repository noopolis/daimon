name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  runtime-image:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read package version
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build runtime artifact image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runtime
          load: true
          tags: noopolis/spawnfile-runtime-daimon:ci
          build-args: |
            DAIMON_VERSION=${{ steps.package.outputs.version }}
            PI_VERSION=0.79.9
          cache-from: type=gha,scope=daimon-runtime-image
          cache-to: type=gha,scope=daimon-runtime-image,mode=max

      - name: Verify runtime artifact contents
        shell: bash
        run: |
          set -euo pipefail
          container_id="$(docker create noopolis/spawnfile-runtime-daimon:ci noop)"
          trap 'docker rm "$container_id" >/dev/null 2>&1 || true' EXIT
          docker cp "$container_id:/opt/spawnfile/runtime-installs/daimon/package.json" /tmp/daimon-package.json
          node - <<'NODE'
          const pkg = require("/tmp/daimon-package.json");
          const required = [
            "@noopolis/daimon",
            "@earendil-works/pi-coding-agent",
            "@earendil-works/pi-ai"
          ];
          for (const name of required) {
            if (!pkg.dependencies?.[name]) {
              throw new Error(`Missing runtime dependency ${name}`);
            }
          }
          NODE
